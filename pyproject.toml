[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "git-hunk"
version = "0.1.0"
description = "Non-interactive git hunk tool for AI coding agents"
requires-python = ">=3.8"
license = "MIT"
authors = [{name = "Kentaro Wada"}]
dependencies = ["rich>=13"]

[project.scripts]
git-hunk = "git_hunk.cli:main"

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "git-hunk"
version = "0.1.0"
description = "Non-interactive git hunk tool for AI coding agents"
requires-python = ">=3.10"
license = "MIT"
authors = [{name = "Kentaro Wada"}]
dependencies = ["rich>=13"]

[project.scripts]
git-hunk = "git_hunk.cli:main"

[dependency-groups]
dev = [
    "pytest>=7",
    "ruff>=0.15.9",
    "ty>=0.0.28",
]

[tool.ruff.lint]
select = [
  "E",  # pycodestyle
  "F",  # pyflakes
  "I",  # isort
  "UP",  # pyupgrade
]

[tool.ruff.lint.isort]
force-single-line = true

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

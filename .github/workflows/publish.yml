---
name: Publish to PyPI
on:
  push:
    tags: [v*]
permissions: {}
jobs:
  test:
    permissions:
      contents: read
    uses: ./.github/workflows/test.yml
  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0
      - name: Build
        run: SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)" uv build
      - name: Verify built version matches tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          ls -1 dist/
          test -f "dist/git_hunk-${version}-py3-none-any.whl" || {
            echo "::error::no wheel for tag ${GITHUB_REF_NAME} (expected version" \
              "${version}); check fetch-depth and that the tag is a canonical" \
              "PEP 440 version"
            exit 1
          }
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: dist
          path: dist/
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/git-hunk
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0

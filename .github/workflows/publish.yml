---
name: Publish to PyPI
on:
  push:
    tags: [v*]
permissions: {}
jobs:
  test:
    permissions:
      contents: read
    uses: ./.github/workflows/test.yml
  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
      - name: Build
        run: SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)" uv build
      - name: Verify built version matches tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          ls -1 dist/
          test -f "dist/git_hunk-${version}-py3-none-any.whl" || {
            echo "::error::no wheel for tag ${GITHUB_REF_NAME} (expected version" \
              "${version}); check fetch-depth and that the tag is a canonical" \
              "PEP 440 version"
            exit 1
          }
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/git-hunk
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
